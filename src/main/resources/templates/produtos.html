<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Love Makeup BL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .products-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .category-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-button {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab-button:hover,
        .tab-button.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(212, 71, 125, 0.2);
        }

        .product-image-container {
            width: 100%;
            height: 250px;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .product-description {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn-add-cart {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
        }

        .btn-add-cart:hover {
            background: #b8366a;
        }

        .btn-add-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stock-info {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.5rem;
        }

        .search-section {
            background: #f9f9f9;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 10px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .no-products {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .no-products i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            border: none;
            background: none;
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .modal-price {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: bold;
            margin: 1rem 0;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .quantity-selector button {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.3s;
        }

        .quantity-selector button:hover {
            background: #b8366a;
        }

        .quantity-selector input {
            width: 60px;
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-confirm-add {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-confirm-add:hover {
            background: #b8366a;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--primary-color);
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="/" class="logo">
                <i class="fas fa-heart"></i> Love Makeup BL
            </a>
            <div class="header-actions">
                <a href="/carrinho" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
                <a href="/perfil" class="profile-icon">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/produtos" class="active">Produtos</a></li>
                <li><a href="/sobre">Quem Somos</a></li>
                <li><a href="/contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="products-container">
            <h1 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">
                <i class="fas fa-sparkles"></i> Nossos Produtos
            </h1>

            <div class="search-section">
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar produtos...">
            </div>

            <div class="category-tabs">
                <button class="tab-button active" onclick="filterProducts(event, 'all')">
                    <i class="fas fa-th"></i> Todos
                </button>
                <button class="tab-button" onclick="filterProducts(event, 'bases')">
                    <i class="fas fa-brush"></i> Bases
                </button>
                <button class="tab-button" onclick="filterProducts(event, 'sombras')">
                    <i class="fas fa-palette"></i> Sombras
                </button>
                <button class="tab-button" onclick="filterProducts(event, 'batons')">
                    <i class="fas fa-lipstick"></i> Batons
                </button>
                <button class="tab-button" onclick="filterProducts(event, 'alisadores')">
                    <i class="fas fa-wand-magic-sparkles"></i> Alisadores
                </button>
                <button class="tab-button" onclick="filterProducts(event, 'acessorios')">
                    <i class="fas fa-ring"></i> Acessórios
                </button>
            </div>

            <div class="products-grid" id="productsContainer">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Carregando produtos...</p>
                </div>
            </div>

            <div class="no-products" id="noProducts" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>Nenhum produto encontrado</h3>
                <p>Tente ajustar seus filtros de busca</p>
            </div>
        </div>
    </main>

    <!-- Modal de Detalhes do Produto -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalProductName" style="color: var(--primary-color);"></h2>
                <button class="close-modal" onclick="closeProductModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <img id="modalProductImage" src="" alt="" class="modal-image">
            <p id="modalProductDescription" style="color: #666;"></p>
            <div class="modal-price" id="modalProductPrice"></div>
            <p id="modalProductStock" class="stock-info"></p>
            <div class="quantity-selector">
                <button onclick="decreaseModalQuantity()">-</button>
                <input type="number" id="modalQuantity" value="1" min="1">
                <button onclick="increaseModalQuantity()">+</button>
            </div>
            <button class="btn-confirm-add" onclick="confirmAddToCart()">
                <i class="fas fa-cart-plus"></i> Adicionar ao Carrinho
            </button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Love Makeup BL - Belágua, Maranhão</p>
        <p>Rua Nova, nº 4 - Centro</p>
        <p><a href="https://wa.me/5598984067365" target="_blank">WhatsApp: (98) 98406-7365</a></p>
    </footer>

    <script th:src="@{/js/app.js}"></script>
    <script>
        let allProducts = [];
        let filteredProducts = [];
        let currentFilterCategory = 'all';
        let modalProductId = null;

        async function loadProducts() {
            try {
                const response = await fetch('/api/produtos');
                if (!response.ok) throw new Error('Erro ao carregar produtos');

                allProducts = await response.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('productsContainer').innerHTML =
                    '<div class="no-products"><i class="fas fa-exclamation-circle"></i><h3>Erro ao carregar produtos</h3></div>';
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            const noProducts = document.getElementById('noProducts');

            if (products.length === 0) {
                container.style.display = 'none';
                noProducts.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            noProducts.style.display = 'none';

            container.innerHTML = products.map(product => `
                <div class="product-card" data-product-id="${product.id}" data-category="${product.categoria || 'outros'}" data-name="${product.nome.toLowerCase()}">
                    <div class="product-image-container" onclick="openProductModal(${product.id})">
                        <img src="https://via.placeholder.com/250x250?text=${encodeURIComponent(product.nome)}"
                             alt="${product.nome}" class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.nome}</div>
                        <div class="product-description">${product.descricao || 'Produto de qualidade'}</div>
                        <div class="product-footer">
                            <span class="product-price">R$ ${product.preco.toFixed(2)}</span>
                            <button class="btn-add-cart" onclick="openProductModal(${product.id})"
                                    ${product.estoque <= 0 ? 'disabled' : ''}>
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="stock-info">
                            ${product.estoque > 0 ? `Em estoque: ${product.estoque}` : 'Fora de estoque'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(event, category) {
            currentFilterCategory = category;

            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (category === 'all') {
                filteredProducts = allProducts;
            } else {
                filteredProducts = allProducts.filter(p => p.categoria === category);
            }

            displayProducts(filteredProducts);
        }

        document.getElementById('searchInput')?.addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();

            const toSearch = currentFilterCategory === 'all' ? allProducts : filteredProducts;
            const results = toSearch.filter(p =>
                p.nome.toLowerCase().includes(searchTerm) ||
                (p.descricao || '').toLowerCase().includes(searchTerm)
            );

            displayProducts(results);
        });

        function openProductModal(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            modalProductId = productId;
            document.getElementById('modalProductName').textContent = product.nome;
            document.getElementById('modalProductImage').src =
                `https://via.placeholder.com/400x400?text=${encodeURIComponent(product.nome)}`;
            document.getElementById('modalProductDescription').textContent =
                product.descricao || 'Descrição não disponível';
            document.getElementById('modalProductPrice').textContent =
                `R$ ${product.preco.toFixed(2)}`;
            document.getElementById('modalProductStock').textContent =
                `Estoque: ${product.estoque} unidades`;
            document.getElementById('modalQuantity').value = '1';
            document.getElementById('modalQuantity').max = product.estoque;

            document.getElementById('productModal').classList.add('show');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('show');
            modalProductId = null;
        }

        function increaseModalQuantity() {
            const input = document.getElementById('modalQuantity');
            const max = parseInt(input.max);
            if (parseInt(input.value) < max) {
                input.value = parseInt(input.value) + 1;
            }
        }

        function decreaseModalQuantity() {
            const input = document.getElementById('modalQuantity');
            if (parseInt(input.value) > 1) {
                input.value = parseInt(input.value) - 1;
            }
        }

        function confirmAddToCart() {
            const product = allProducts.find(p => p.id === modalProductId);
            if (!product) return;

            const quantity = parseInt(document.getElementById('modalQuantity').value);

            const cartItem = {
                id: product.id,
                name: product.nome,
                price: product.preco,
                image: `https://via.placeholder.com/250x250?text=${encodeURIComponent(product.nome)}`,
                quantity: quantity
            };

            cartManager.addToCart(cartItem);
            closeProductModal();
            alert(`${quantity} ${quantity === 1 ? 'produto' : 'produtos'} adicionado(s) ao carrinho!`);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target === modal) {
                closeProductModal();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
